<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>BoneForge — Reset Password</title>
<link rel="icon" type="image/png" href="/static/boneforge-logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,600;0,700;0,800;0,900;1,900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0806;--bg-card:#141312;--orange:#d4580a;--orange-bright:#e8620e;--orange-dim:rgba(212,88,10,0.12);--text:#b8b3ab;--text-dim:#6e6960;--white:#f0ece6;--border:#1e1c19;--font:'Inter',-apple-system,sans-serif;--red:#e84040;--green:#2dd4a0;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);-webkit-font-smoothing:antialiased;overflow:hidden}
body::after{content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;opacity:0.022;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-repeat:repeat;background-size:200px}
.embers{position:fixed;inset:0;pointer-events:none;z-index:1;overflow:hidden}
.ember{position:absolute;border-radius:9999px;opacity:0}
@keyframes ember-rise{0%{opacity:0;transform:translateY(0) translateX(0)}10%{opacity:0.8}85%{opacity:0.35}100%{opacity:0;transform:translateY(-260px) translateX(var(--drift))}}
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;position:relative;z-index:10}
.login-card{width:100%;max-width:420px;padding:52px 44px 44px;background:rgba(14,12,10,0.92);border:1px solid var(--border);border-radius:24px;backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);text-align:center;animation:card-in 0.7s cubic-bezier(0.16,1,0.3,1) both;box-shadow:0 40px 100px rgba(0,0,0,0.6),0 0 0 1px rgba(212,88,10,0.05) inset;position:relative;overflow:hidden}
@keyframes card-in{from{opacity:0;transform:translateY(28px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.glow-line{position:absolute;top:0;left:15%;right:15%;height:1px;background:linear-gradient(to right,transparent,rgba(212,88,10,0.6),transparent)}
.login-logo{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:6px}
.login-logo img{width:44px;height:44px;object-fit:contain}
.login-logo-text{font-size:1.55rem;font-weight:900;letter-spacing:-0.03em;color:var(--white)}
.page-title{font-size:1.1rem;font-weight:700;color:var(--white);margin:24px 0 8px}
.page-subtitle{font-size:0.82rem;color:var(--text-dim);margin-bottom:28px;line-height:1.5}
.login-form{display:flex;flex-direction:column;gap:12px}
.login-input{width:100%;padding:14px 18px;border:1px solid var(--border);border-radius:12px;background:rgba(10,8,6,0.7);color:var(--white);font-size:0.92rem;font-family:var(--font);outline:none;text-align:left;transition:border-color 0.25s,box-shadow 0.25s}
.login-input::placeholder{color:rgba(110,105,96,0.55)}
.login-input:focus{border-color:rgba(212,88,10,0.45);box-shadow:0 0 0 3px rgba(212,88,10,0.07);background:#0a0806;color:#f0ece6}
.login-input:-webkit-autofill,
.login-input:-webkit-autofill:hover,
.login-input:-webkit-autofill:focus,
.login-input:-webkit-autofill:active{-webkit-box-shadow:0 0 0 30px #0a0806 inset !important;-webkit-text-fill-color:#f0ece6 !important;transition:background-color 5000s ease-in-out 0s;caret-color:#f0ece6}
.login-btn{width:100%;padding:15px;border:none;border-radius:50px;background:var(--orange);color:var(--white);font-size:0.9rem;font-weight:700;font-family:var(--font);cursor:pointer;position:relative;overflow:hidden;transition:background 0.2s,transform 0.2s,box-shadow 0.2s;letter-spacing:0.02em;margin-top:4px}
.login-btn:hover{background:var(--orange-bright);transform:translateY(-2px) scale(1.02);box-shadow:0 8px 32px rgba(212,88,10,0.28)}
.login-btn:active{transform:scale(0.97)}
.login-btn::before{content:'';position:absolute;top:0;left:0;width:50%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.1),transparent);transform:translateX(-200%) skewX(-15deg);pointer-events:none}
.login-btn:hover::before{animation:sunray 0.55s ease forwards}
@keyframes sunray{to{transform:translateX(300%) skewX(-15deg)}}
.msg{font-size:0.82rem;font-weight:500;padding:12px 16px;border-radius:10px;margin-top:8px;text-align:left}
.msg-error{color:var(--red);background:rgba(232,64,64,0.08);border:1px solid rgba(232,64,64,0.15)}
.msg-success{color:var(--green);background:rgba(45,212,160,0.08);border:1px solid rgba(45,212,160,0.15)}
.back-link{display:block;text-align:center;font-size:0.78rem;color:var(--text-dim);margin-top:20px;text-decoration:none;transition:color 0.2s}
.back-link:hover{color:var(--orange)}
</style>
</head>
<body>
<div class="embers" id="embers"></div>
<div class="login-wrap">
  <div class="login-card">
    <div class="glow-line"></div>
    <div class="login-logo">
      <img src="/static/boneforge-logo.png" alt="BoneForge">
      <span class="login-logo-text">BoneForge</span>
    </div>
    <div class="page-title">Reset your password</div>
    <div class="page-subtitle">Enter your email and we'll send you a reset link.</div>
    <form class="login-form" method="POST" action="/forgot-password">
      <input type="email" name="email" class="login-input" placeholder="Email address" autocomplete="email" required>
      <button type="submit" class="login-btn">Send Reset Link</button>
    </form>
    {% if success %}
    <div class="msg msg-success">{{ success }}</div>
    {% endif %}
    {% if error %}
    <div class="msg msg-error">{{ error }}</div>
    {% endif %}
    <a href="/login" class="back-link">&larr; Back to login</a>
  </div>
</div>
<script>
(function(){
  var c=document.getElementById('embers');
  for(var i=0;i<32;i++){
    var e=document.createElement('div');e.classList.add('ember');
    var sz=1.8+Math.random()*3,dr=(Math.random()-0.5)*70,r=Math.random();
    e.style.cssText='left:'+(Math.random()*92+4)+'%;bottom:'+(Math.random()*18-8)+'%;width:'+sz+'px;height:'+sz+'px;background:'+(r>0.6?'#ff8c3a':r>0.3?'#e06b18':'#d4580a')+';box-shadow:0 0 '+(4+sz*2.5)+'px '+(1+sz)+'px rgba(212,88,10,0.4);animation:ember-rise '+(7+Math.random()*12)+'s linear '+(Math.random()*10)+'s infinite';
    e.style.setProperty('--drift',dr+'px');c.appendChild(e);
  }
})();
</script>
</body>
</html>
