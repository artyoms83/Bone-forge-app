<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>BoneForge — History</title>
<link rel="icon" type="image/png" href="/static/boneforge-logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">
<style>
  .hist-page { max-width: 900px; margin: 0 auto; padding: 40px 24px 80px; }
  .hist-header { margin-bottom: 32px; }
  .hist-title { font-size: 1.6rem; font-weight: 700; color: var(--white); margin-bottom: 4px; }
  .hist-subtitle { color: var(--text-dim); font-size: 0.85rem; }

  .hist-empty {
    text-align: center; padding: 48px 20px; color: var(--text-dim);
    font-size: 0.9rem; border: 1px dashed var(--border); border-radius: 12px;
  }

  .hist-list { display: flex; flex-direction: column; gap: 12px; }

  .hist-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 12px; overflow: hidden; transition: border-color 0.2s;
  }
  .hist-card:hover { border-color: var(--border-bright); }

  .hist-card-top {
    padding: 16px 20px; display: flex; align-items: center;
    gap: 12px; cursor: pointer;
  }

  .hist-concept {
    font-weight: 600; color: var(--white); font-size: 0.92rem;
    flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .hist-pill {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 0.68rem; font-weight: 600; padding: 3px 8px;
    border-radius: 5px; white-space: nowrap; flex-shrink: 0;
  }
  .hist-pill-formula { background: var(--orange-soft); color: var(--orange); }
  .hist-pill-wc { background: rgba(255,255,255,0.04); color: var(--text-dim); }

  .hist-meta { font-size: 0.72rem; color: var(--text-muted); flex-shrink: 0; }

  .hist-expand-icon { color: var(--text-muted); transition: transform 0.2s; flex-shrink: 0; }
  .hist-card.expanded .hist-expand-icon { transform: rotate(90deg); }

  .hist-card-body { display: none; padding: 0 20px 16px; border-top: 1px solid var(--border); }
  .hist-card.expanded .hist-card-body { display: block; }

  .hist-section { margin-top: 14px; }
  .hist-section-label {
    font-size: 0.7rem; font-weight: 600; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 6px;
  }
  .hist-script-text {
    font-size: 0.82rem; color: var(--text); line-height: 1.6; white-space: pre-wrap;
    background: var(--bg); padding: 12px 14px; border-radius: 8px;
    border: 1px solid var(--border); max-height: 300px; overflow-y: auto;
  }

  .hist-prompt-list { list-style: none; padding: 0; }
  .hist-prompt-item {
    font-size: 0.78rem; color: var(--text); padding: 6px 0;
    border-bottom: 1px solid var(--border); display: flex; gap: 8px; align-items: flex-start;
  }
  .hist-prompt-item:last-child { border-bottom: none; }
  .hist-prompt-num { color: var(--orange); font-weight: 600; font-size: 0.72rem; min-width: 22px; flex-shrink: 0; }
  .hist-prompt-text { flex: 1; }
  .hist-prompt-copy {
    background: none; color: var(--text-muted); padding: 2px; flex-shrink: 0;
    transition: color 0.2s; cursor: pointer; border: none; outline: none;
  }
  .hist-prompt-copy:hover { color: var(--orange); }

  .hist-collapse-section { cursor: pointer; user-select: none; }
  .hist-collapse-section .hist-section-label { display: flex; align-items: center; gap: 6px; }
  .hist-collapse-arrow { font-size: 0.6rem; transition: transform 0.2s; }
  .hist-collapse-section.open .hist-collapse-arrow { transform: rotate(90deg); }
  .hist-collapse-content { display: none; }
  .hist-collapse-section.open .hist-collapse-content { display: block; }

  .hist-actions { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
  .hist-action-btn {
    font-size: 0.75rem; font-weight: 500; padding: 6px 12px; border-radius: 7px;
    transition: background 0.2s, color 0.2s; display: inline-flex; align-items: center; gap: 5px;
  }
  .hist-btn-copy { background: rgba(255,255,255,0.04); color: var(--text); }
  .hist-btn-copy:hover { background: rgba(255,255,255,0.08); }
  .hist-btn-regen { background: var(--orange-soft); color: var(--orange); }
  .hist-btn-regen:hover { background: rgba(212,88,10,0.2); }
  .hist-btn-open { background: rgba(255,255,255,0.04); color: var(--text); }
  .hist-btn-open:hover { background: rgba(255,255,255,0.08); }
  .hist-btn-generate { background: var(--orange); color: #fff; }
  .hist-btn-generate:hover { background: var(--orange-bright); }
  .hist-btn-delete { background: none; color: var(--text-muted); margin-left: auto; }
  .hist-btn-delete:hover { color: #e84040; }

  /* Gallery inside history cards */
  .hist-gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 8px; margin-top: 10px; }
  .hist-gallery-card {
    position: relative; background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; overflow: hidden; aspect-ratio: 9/16;
  }
  .hist-gallery-num {
    position: absolute; top: 4px; left: 6px; font-size: 0.6rem;
    font-weight: 700; color: var(--orange); z-index: 1;
  }
  .hist-gallery-skeleton {
    display: flex; align-items: center; justify-content: center;
    width: 100%; height: 100%;
  }
  .hist-gallery-skeleton .skeleton-shimmer {
    position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent 0%, rgba(212,88,10,0.04) 50%, transparent 100%);
    background-size: 200% 100%; animation: shimmer 1.5s infinite;
  }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  .hist-gallery-loading { font-size: 0.65rem; color: var(--text-muted); z-index: 1; }
  .hist-gallery-img { width: 100%; height: 100%; object-fit: cover; display: none; }
  .hist-gallery-retry {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 0.65rem; font-weight: 500; color: var(--orange); background: var(--orange-soft);
    border: none; border-radius: 5px; padding: 4px 10px; cursor: pointer;
    transition: background 0.2s; z-index: 1; margin-top: 6px;
  }
  .hist-gallery-retry:hover { background: rgba(212,88,10,0.2); }
</style>
</head>
<body>

<!-- NAV -->
<nav class="dash-nav">
  <div class="dash-nav-inner">
    <a href="/dashboard" class="dash-nav-logo">
      <img src="/static/boneforge-logo.png" alt="BoneForge">
      <span>BoneForge</span>
    </a>
    <div class="dash-nav-right">
      <button class="hamburger-btn" id="hamburgerBtn" onclick="toggleSidebar()">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M3 5h14M3 10h14M3 15h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
      <a href="/settings" class="dash-nav-gear" title="Settings">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <circle cx="9" cy="9" r="2.5" stroke="currentColor" stroke-width="1.4"/>
          <path d="M9 1v2M9 15v2M1 9h2M15 9h2M3.2 3.2l1.4 1.4M13.4 13.4l1.4 1.4M3.2 14.8l1.4-1.4M13.4 4.6l1.4-1.4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
      </a>
      <a href="/logout" class="dash-nav-logout">Logout</a>
    </div>
  </div>
</nav>

<div class="dash-embers" id="dashEmbers"></div>

<div class="dash-layout">

  <!-- SIDEBAR -->
  <aside class="dash-sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">Create</div>
      <a href="/dashboard" class="sidebar-btn">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        New Video
      </a>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Library</div>
      <a href="/characters" class="sidebar-btn">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="2" y="3" width="12" height="10" rx="2" stroke="currentColor" stroke-width="1.2"/><path d="M5 7h6M5 9.5h4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
        Characters
      </a>
      <a href="/history" class="sidebar-btn sidebar-btn-active">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="5.5" stroke="currentColor" stroke-width="1.2"/><path d="M8 5.5v3l2 1.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        History
      </a>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Account</div>
      <a href="/pricing" class="sidebar-btn">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 1.5v13M4.5 4.5h5a2 2 0 0 1 0 4H5.5M5 8.5h4.5a2 2 0 0 1 0 4h-5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Pricing
      </a>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Tools</div>
      <button class="sidebar-btn sidebar-btn-disabled">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M12 4L4 12M8 4h4v4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Viral Analyzer
        <span class="sidebar-badge">Soon</span>
      </button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="dash-main">
    <div class="hist-page">
      <div class="hist-header">
        <h1 class="hist-title">History</h1>
        <p class="hist-subtitle">Your previously generated videos. Click to expand details.</p>
      </div>
      <div id="histList"></div>
    </div>
  </main>
</div>

<script>
var OWNER_MODE = {{ owner_mode|tojson }};
var historyItems = {};

var copySvg = '<svg width="12" height="12" viewBox="0 0 14 14" fill="none"><rect x="4" y="4" width="8" height="8" rx="1.5" stroke="currentColor" stroke-width="1.2"/><path d="M10 4V3a1.5 1.5 0 0 0-1.5-1.5h-5A1.5 1.5 0 0 0 2 3v5A1.5 1.5 0 0 0 3.5 9.5H4" stroke="currentColor" stroke-width="1.2"/></svg>';

function buildPromptList(items) {
  if (!items || items.length === 0) return '<div style="color:var(--text-muted);font-size:0.8rem">None</div>';
  var html = '<ol class="hist-prompt-list">';
  items.forEach(function(p, i) {
    html += '<li class="hist-prompt-item">' +
      '<span class="hist-prompt-num">' + String(i+1).padStart(2,'0') + '</span>' +
      '<span class="hist-prompt-text">' + escapeHtml(p) + '</span>' +
      '<button class="hist-prompt-copy" onclick="event.stopPropagation();copyLine(this)" title="Copy">' + copySvg + '</button>' +
    '</li>';
  });
  html += '</ol>';
  return html;
}

function loadHistory() {
  fetch('/history-data').then(function(r) { return r.json(); }).then(function(data) {
    var items = data.history || [];
    var container = document.getElementById('histList');

    if (items.length === 0) {
      container.innerHTML = '<div class="hist-empty">No history yet. Generate your first video above.</div>';
      return;
    }

    container.innerHTML = '';
    var list = document.createElement('div');
    list.className = 'hist-list';

    items.forEach(function(item) {
      historyItems[item.id] = item;
      var card = document.createElement('div');
      card.className = 'hist-card';

      var date = item.created_at ? new Date(item.created_at) : null;
      var dateStr = date ? date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '';
      var formulaLabel = (item.formula || 'a').toUpperCase();
      var wc = item.word_count || '?';
      var concept = item.concept || 'Untitled';
      var prompts = item.image_prompts || [];
      var directives = item.animation_directives || [];

      var generateBtn = '';
      if (OWNER_MODE && prompts.length > 0) {
        generateBtn = '<button class="hist-action-btn hist-btn-generate" onclick="histGenerateAll(\'' + item.id + '\', this)">Generate All ' + prompts.length + ' Images</button>';
      }

      card.innerHTML =
        '<div class="hist-card-top" onclick="toggleHistCard(this.parentElement)">' +
          '<div class="hist-concept">' + escapeHtml(concept) + '</div>' +
          '<span class="hist-pill hist-pill-formula">Formula ' + formulaLabel + '</span>' +
          '<span class="hist-pill hist-pill-wc">' + wc + ' words</span>' +
          '<span class="hist-meta">' + dateStr + '</span>' +
          '<svg class="hist-expand-icon" width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M5 3l4 4-4 4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>' +
        '</div>' +
        '<div class="hist-card-body">' +
          '<div class="hist-section">' +
            '<div class="hist-section-label">Script</div>' +
            '<div class="hist-script-text">' + escapeHtml(item.script || '') + '</div>' +
          '</div>' +
          '<div class="hist-section hist-collapse-section" onclick="toggleCollapse(this)">' +
            '<div class="hist-section-label"><span class="hist-collapse-arrow">&#9654;</span> Image Prompts (' + prompts.length + ')</div>' +
            '<div class="hist-collapse-content">' + buildPromptList(prompts) + '</div>' +
          '</div>' +
          '<div class="hist-section hist-collapse-section" onclick="toggleCollapse(this)">' +
            '<div class="hist-section-label"><span class="hist-collapse-arrow">&#9654;</span> Animation Directives (' + directives.length + ')</div>' +
            '<div class="hist-collapse-content">' + buildPromptList(directives) + '</div>' +
          '</div>' +
          '<div class="hist-gallery-wrap" id="gallery-' + item.id + '"></div>' +
          '<div class="hist-actions">' +
            '<button class="hist-action-btn hist-btn-copy" onclick="copyScript(this, ' + JSON.stringify(JSON.stringify(item.script || '')) + ')">Copy Script</button>' +
            '<button class="hist-action-btn hist-btn-open" onclick="openInDashboard(\'' + item.id + '\')">Open in Dashboard</button>' +
            generateBtn +
            '<button class="hist-action-btn hist-btn-regen" onclick="regenerateFromHistory(' + JSON.stringify(JSON.stringify(concept)) + ', ' + JSON.stringify(JSON.stringify(item.formula || 'a')) + ', ' + (item.word_count || 180) + ', ' + JSON.stringify(JSON.stringify(item.character_id || 'napoleon')) + ')">Regenerate</button>' +
            '<button class="hist-action-btn hist-btn-delete" onclick="deleteHistoryItem(\'' + item.id + '\', this)">Delete</button>' +
          '</div>' +
        '</div>';

      list.appendChild(card);
    });

    container.appendChild(list);
  });
}
loadHistory();

function toggleHistCard(card) { card.classList.toggle('expanded'); }
function toggleCollapse(section) { section.classList.toggle('open'); }

function copyLine(btn) {
  var text = btn.parentElement.querySelector('.hist-prompt-text').textContent;
  navigator.clipboard.writeText(text).then(function() {
    btn.style.color = '#2dd4a0';
    setTimeout(function() { btn.style.color = ''; }, 1500);
  });
}

function copyScript(btn, text) {
  navigator.clipboard.writeText(text).then(function() {
    var orig = btn.textContent;
    btn.textContent = 'Copied!';
    btn.style.color = '#2dd4a0';
    setTimeout(function() { btn.textContent = orig; btn.style.color = ''; }, 2000);
  });
}

function openInDashboard(histId) {
  var item = historyItems[histId];
  if (!item) return;
  localStorage.setItem('restore_history', JSON.stringify(item));
  window.location.href = '/dashboard';
}

function regenerateFromHistory(concept, formula, wordCount, characterId) {
  localStorage.setItem('prefill_concept', concept);
  localStorage.setItem('prefill_formula', formula);
  localStorage.setItem('prefill_word_count', wordCount);
  localStorage.setItem('prefill_character', characterId);
  window.location.href = '/dashboard';
}

function deleteHistoryItem(id, btn) {
  if (!confirm('Delete this history item?')) return;
  var card = btn.closest('.hist-card');
  fetch('/history/delete', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ id: id })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.success && card) {
      card.style.opacity = '0';
      card.style.transform = 'translateY(-8px)';
      card.style.transition = 'opacity 0.3s, transform 0.3s';
      setTimeout(function() { card.remove(); }, 300);
    }
  });
}

// Generate all images inside a history card
function histGenerateAll(histId, btn) {
  var item = historyItems[histId];
  if (!item || !item.image_prompts) return;
  var prompts = item.image_prompts;
  var charKey = item.character_id || 'base';
  var total = prompts.length;
  var wrap = document.getElementById('gallery-' + histId);

  btn.disabled = true;
  btn.textContent = 'Generating 1 / ' + total + '...';

  // Build gallery grid
  wrap.innerHTML = '';
  var gallery = document.createElement('div');
  gallery.className = 'hist-gallery';
  prompts.forEach(function(p, i) {
    var card = document.createElement('div');
    card.className = 'hist-gallery-card';
    card.innerHTML =
      '<div class="hist-gallery-num">' + String(i+1).padStart(2,'0') + '</div>' +
      '<div class="hist-gallery-skeleton" id="hgs-' + histId + '-' + i + '">' +
        '<div class="skeleton-shimmer"></div>' +
        '<span class="hist-gallery-loading">Queued</span>' +
      '</div>' +
      '<img class="hist-gallery-img" id="hgi-' + histId + '-' + i + '" alt="Scene ' + (i+1) + '">';
    gallery.appendChild(card);
  });
  wrap.appendChild(gallery);

  function showRetry(skel, histId, idx, prompts, charKey) {
    if (!skel) return;
    var loading = skel.querySelector('.hist-gallery-loading');
    loading.textContent = 'Failed';
    var retryBtn = document.createElement('button');
    retryBtn.className = 'hist-gallery-retry';
    retryBtn.innerHTML = '<svg width="10" height="10" viewBox="0 0 14 14" fill="none"><path d="M1.5 7a5.5 5.5 0 0 1 9.5-3.7M12.5 7a5.5 5.5 0 0 1-9.5 3.7" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><path d="M11 1v2.5h-2.5M3 11v-2.5h2.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg> Retry';
    retryBtn.onclick = function(e) {
      e.stopPropagation();
      retryBtn.remove();
      loading.textContent = 'Generating...';
      var shimmer = skel.querySelector('.skeleton-shimmer');
      if (shimmer) shimmer.style.display = '';
      retrySingleImage(histId, idx, prompts, charKey);
    };
    skel.appendChild(retryBtn);
    var shimmer = skel.querySelector('.skeleton-shimmer');
    if (shimmer) shimmer.style.display = 'none';
  }

  function retrySingleImage(histId, idx, prompts, charKey) {
    var skel = document.getElementById('hgs-' + histId + '-' + idx);
    var img = document.getElementById('hgi-' + histId + '-' + idx);
    fetch('/generate-image', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt: prompts[idx], character_key: charKey, model_key: 'nano_banana_2' })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.image) {
        try {
          var b64 = data.image.split(',')[1];
          var mime = data.image.split(';')[0].split(':')[1];
          var bytes = atob(b64);
          var arr = new Uint8Array(bytes.length);
          for (var j = 0; j < bytes.length; j++) arr[j] = bytes.charCodeAt(j);
          var blob = new Blob([arr], { type: mime });
          var url = URL.createObjectURL(blob);
          img.onload = function() { if (skel) skel.style.display = 'none'; img.style.display = 'block'; };
          img.src = url;
        } catch(e) { showRetry(skel, histId, idx, prompts, charKey); }
      } else { showRetry(skel, histId, idx, prompts, charKey); }
    })
    .catch(function() { showRetry(skel, histId, idx, prompts, charKey); });
  }

  function genNext(idx) {
    if (idx >= total) {
      btn.disabled = false;
      btn.textContent = 'Regenerate All ' + total + ' Images';
      return;
    }
    var skel = document.getElementById('hgs-' + histId + '-' + idx);
    var img = document.getElementById('hgi-' + histId + '-' + idx);
    if (skel) skel.querySelector('.hist-gallery-loading').textContent = 'Generating...';

    fetch('/generate-image', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt: prompts[idx], character_key: charKey, model_key: 'nano_banana_2' })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.image) {
        try {
          var b64 = data.image.split(',')[1];
          var mime = data.image.split(';')[0].split(':')[1];
          var bytes = atob(b64);
          var arr = new Uint8Array(bytes.length);
          for (var i = 0; i < bytes.length; i++) arr[i] = bytes.charCodeAt(i);
          var blob = new Blob([arr], { type: mime });
          var url = URL.createObjectURL(blob);
          img.onload = function() { if (skel) skel.style.display = 'none'; img.style.display = 'block'; };
          img.src = url;
        } catch(e) {
          showRetry(skel, histId, idx, prompts, charKey);
        }
      } else {
        showRetry(skel, histId, idx, prompts, charKey);
      }
      btn.textContent = 'Generating ' + (idx+2) + ' / ' + total + '...';
      genNext(idx + 1);
    })
    .catch(function() {
      showRetry(skel, histId, idx, prompts, charKey);
      genNext(idx + 1);
    });
  }
  genNext(0);
}

function escapeHtml(str) { var d = document.createElement('div'); d.textContent = str; return d.innerHTML; }

// Embers
(function () {
  var c = document.getElementById('dashEmbers');
  if (!c) return;
  for (var i = 0; i < 18; i++) {
    var e = document.createElement('div');
    e.classList.add('dash-ember');
    var sz = 1.5 + Math.random() * 2.5;
    var dr = (Math.random() - 0.5) * 50;
    var r = Math.random();
    e.style.cssText =
      'left:' + (Math.random() * 90 + 5) + '%;' +
      'bottom:' + (Math.random() * 15 - 5) + '%;' +
      'width:' + sz + 'px;height:' + sz + 'px;' +
      'background:' + (r > 0.6 ? '#ff8c3a' : r > 0.3 ? '#e06b18' : '#d4580a') + ';' +
      'box-shadow:0 0 ' + (3 + sz * 2) + 'px ' + (1 + sz) + 'px rgba(212,88,10,0.35);' +
      'animation:dash-ember-rise ' + (8 + Math.random() * 14) + 's linear ' + (Math.random() * 12) + 's infinite';
    e.style.setProperty('--drift', dr + 'px');
    c.appendChild(e);
  }
})();
</script>
<script src="/static/app.js"></script>
</body>
